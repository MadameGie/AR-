<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <title>Packaging AR Experience</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

  <!-- LANDING PAGE -->
  <section id="landing-page">

    <div class="overlay"></div>

    <div class="hero-content">

      <div class="badge">
        WEB AUGMENTED REALITY
      </div>

      <h1>
        Interactive Packaging
        Experience
      </h1>

      <p>
        Scan your packaging directly from your browser
        and explore immersive 3D visualization.
      </p>

      <button id="startButton">
        START AR SCAN
      </button>

    </div>

  </section>


  <!-- LOADING -->
  <div id="loading-screen">

    <div class="loader"></div>

    <p>
      Initializing Camera...
    </p>

  </div>


  <!-- SCAN GUIDE -->
  <div id="scan-guide">

    <div class="scan-box"></div>

    <div class="scan-text">
      Point camera to packaging
    </div>

  </div>


  <!-- AR SCENE -->
<a-scene

  id="arScene"

  mindar-image="
    imageTargetSrc: ./assets/targets.mind;
    autoStart: false;
    uiScanning: false;
    uiLoading: false;
  "

  color-space="sRGB"

  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    antialias: true;
  "

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  style="
    width:100vw;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    display:none;
  "
>


    <!-- CAMERA -->
    <a-camera
      position="0 0 0"
      look-controls="enabled:false"
      camera="fov: 80"
    >
    </a-camera>


    <!-- LIGHT -->
    <a-light
      type="ambient"
      intensity="1"
    >
    </a-light>


    <a-light
      type="directional"
      position="0 2 1"
      intensity="1"
    >
    </a-light>


    <!-- TARGET -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- MODEL -->
<a-box

  position="0 0 0"

  rotation="0 0 0"

  width="0.5"

  height="0.5"

  depth="0.5"

  color="red"

>
</a-box>

    </a-entity>

  </a-scene>


  <!-- JAVASCRIPT -->
  <script src="app.js"></script>

</body>
</html>
